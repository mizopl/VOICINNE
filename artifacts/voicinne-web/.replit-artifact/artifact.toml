kind = "web"
previewPath = "/voicinne-web/"
title = "Voicinne Web"
version = "1.0.0"
id = "artifacts/voicinne-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/voicinne-web/" ]
localPort = 22580

[services.development]
run = "pnpm --filter @workspace/voicinne-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voicinne-web", "run", "build" ]
publicDir = "artifacts/voicinne-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22580"
BASE_PATH = "/voicinne-web/"
